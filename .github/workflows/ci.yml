name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: shellcheck
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck hooks/scripts/expand-output.sh scripts/faa-wrap.sh scripts/bench.sh scripts/mine-dict.sh scripts/verify-deltas.sh lib/expansion.sh test/run.sh test/apfel-stub.sh

      - name: manifest structure (C0 regression gate)
        run: |
          jq -e '.author | type == "object"' .claude-plugin/plugin.json
          jq -e '.name and .version and .license' .claude-plugin/plugin.json
          jq -e '.plugins | type == "array"' .claude-plugin/marketplace.json

      - name: claude plugin validate (best effort)
        run: |
          if npm install -g @anthropic-ai/claude-code >/dev/null 2>&1 && command -v claude >/dev/null 2>&1; then
            claude plugin validate .
          else
            echo "claude CLI unavailable in CI — structural jq checks above stand in"
          fi

      - name: test suite
        run: bash test/run.sh
